<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Survey Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #3de8ff;
        }
        .container {
            width: 50%;
            margin: auto;
            background: #46c7ff;
            padding: 20px;
            border-radius: 8px;
        }
        h1 {
            text-align: center;
        }
        label {
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0 15px 0;
        }
        input[type="radio"],
        input[type="checkbox"] {
            width: auto;
        }
        button {
            background-color: #007BFF;
            color: rgb(82, 206, 255);
            padding: 10px;
            border: none;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Student Survey Form</h1>

    <form>
        <!-- Name -->
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>

        <!-- Email -->
        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <!-- Age -->
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" min="15" max="60">

        <!-- Gender -->
        <label>Gender:</label><br>
        <input type="radio" name="gender" value="male"> Male <br>
        <input type="radio" name="gender" value="female"> Female <br>
        <input type="radio" name="gender" value="other"> Other <br><br>

        <!-- Course -->
        <label for="course">Course of Study:</label>
        <select id="course" name="course">
            <option value="">-- Select Course --</option>
            <option value="IT">Information Technology</option>
            <option value="CS">Computer Science</option>
            <option value="Engineering">Engineering</option>
            <option value="Business">Business</option>
        </select>

        <!-- Skills -->
        <label>Skills You Have:</label><br>
        <input type="checkbox" name="skills" value="programming"> Programming <br>
        <input type="checkbox" name="skills" value="networking"> Networking <br>
        <input type="checkbox" name="skills" value="cybersecurity"> Cybersecurity <br>
        <input type="check
